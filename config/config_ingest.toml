[tool.blender_kb_mcp.db]
DB_NAME = "./build/db/blender_docs_chromadb"
COLLECTION_NAME = "blender_api"
METADATA_USE = true
METADATA_VERSION = "5.1"
HOST = "127.0.0.1"
PORT = 8000
LOCAL_DB = true

[tool.blender_kb_mcp.llm]
MODEL_NAME = "qwen3-embedding:0.6b"
HOST = "ollama"

[tool.blender_kb_mcp.ingest]
DOC_PATHS = [
    "./build/kb/blender_python_reference_5_1",
    "./build/kb/blender_open_shader_lang_5_1",
    "./build/kb/blender_templates_5_1",
]
CLEAN_ALG = "traf"
BATCH_SIZE = 50

[tool.blender_kb_mcp.formats]
ENABLE_MARKDOWN = true
ENABLE_HTML = true
ALLOWED_EXTENSIONS = [".html", ".htm", ".md", ".markdown"]
FORMAT_FALLBACK = "traf"

