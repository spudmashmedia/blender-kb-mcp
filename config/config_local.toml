[tool.blender_kb_mcp.db]
DB_NAME = "./db/blender_docs_chromadb"
COLLECTION_NAME = "blender_api"
METADATA_USE = true
METADATA_VERSION = "5.1"
HOST = "127.0.0.1"
PORT = 8000

[tool.blender_kb_mcp.llm]
MODEL_NAME = "qwen3-embedding:0.6b"
HOST = "127.0.0.1"

[tool.blender_kb_mcp.query]
RESPONSE_TYPE = "embeddings"
TOTAL_RESULTS = 30
CONTENT_LENGTH = 200
SIMILARITY_THRESHOLD = 0.01

[tool.blender_kb_mcp.ingest]
DOC_PATHS = [
    "./.tmp/kb/blender_python_reference_5_1",
    "./.tmp/kb/blender_open_shader_lang_5_1",
    "./.tmp/kb/blender_templates_5_1",
]
CLEAN_ALG = "traf"
BATCH_SIZE = 50

[tool.blender_kb_mcp.formats]
ENABLE_MARKDOWN = true
ENABLE_HTML = true
ALLOWED_EXTENSIONS = [".html", ".htm", ".md", ".markdown"]
FORMAT_FALLBACK = "traf"

[tool.blender_kb_mcp.server]
TRANSPORT = "http"
HOST = "127.0.0.1"
PORT = "8000"
