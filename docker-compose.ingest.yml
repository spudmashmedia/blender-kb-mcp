name: blender-kb
services:
  ingest:
    build:
      context: .
      dockerfile: ./src/ingest/ingest.Dockerfile
    container_name: blender-kb-ingest
    volumes:
      - ./data:/app/data
    environment:
      - APP_ENV=ingest
      - DB_ROOT= /app/data/vectors/blender_api_index
      - PYTHONUNBUFFERED=1
    networks:
      - blender-kb-network
    profiles: ["manual"]

networks:
  blender-kb-network:
    driver: bridge

volumes:
  chromadb_data:
